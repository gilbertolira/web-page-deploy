apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webcolor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/gilbertolira/web-page-deploy.git'
    path: k8s/webcolor
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: webcolor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
        